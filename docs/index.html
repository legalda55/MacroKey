<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroKey — Paste Text Blocks Fast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #E64A19;
            --orange-light: #FF7043;
            --orange-dark: #BF360C;
            --cream: #FFF8F0;
            --dark: #1A1A1A;
            --gray: #666;
            --gray-light: #F5F0EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--dark);
            background: var(--cream);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Language Toggle ── */
        .lang-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 1000;
            display: flex;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(230,74,25,0.15);
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--gray);
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background: var(--orange);
            color: white;
        }

        /* RTL support */
        html[dir="rtl"] .lang-toggle {
            right: auto;
            left: 1.2rem;
        }

        html[dir="rtl"] .problem-card {
            border-left: none;
            border-right: 4px solid var(--orange);
        }

        html[dir="rtl"] .phone-header {
            text-align: right;
        }

        html[dir="rtl"] .price-perks {
            text-align: right;
        }

        /* ── Hero ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(230,74,25,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,112,66,0.06) 0%, transparent 50%),
                var(--cream);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(230,74,25,0.07) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .hero-icon {
            width: 88px;
            height: 88px;
            background: var(--orange);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 44px;
            font-weight: 700;
            color: white;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(230,74,25,0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 700;
            line-height: 1.15;
            max-width: 700px;
            margin-bottom: 1.2rem;
            letter-spacing: -0.02em;
        }

        .hero h1 span {
            color: var(--orange);
        }

        .hero p {
            font-size: clamp(1.05rem, 2vw, 1.25rem);
            color: var(--gray);
            max-width: 520px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--orange);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1rem 2.2rem;
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(230,74,25,0.3);
        }

        .cta-btn:hover {
            background: var(--orange-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(230,74,25,0.4);
        }

        .cta-btn svg { width: 22px; height: 22px; }

        .hero-price {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: var(--gray);
        }

        /* ── The Problem ── */
        .problem {
            padding: 5rem 2rem;
            background: white;
        }

        .problem-inner {
            max-width: 960px;
            margin: 0 auto;
        }

        .problem h2 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
        }

        .problem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .problem-card {
            background: var(--gray-light);
            border-radius: 20px;
            padding: 2rem;
            border-left: 4px solid var(--orange);
        }

        .problem-scene {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .problem-emoji {
            font-size: 1.6rem;
            line-height: 1;
            min-width: 30px;
        }

        .problem-quote {
            font-size: 1.05rem;
            font-weight: 600;
            font-style: italic;
            color: var(--dark);
            line-height: 1.5;
        }

        .problem-desc {
            font-size: 0.95rem;
            color: var(--gray);
            line-height: 1.65;
        }

        .problem-punchline {
            text-align: center;
            font-size: 1.15rem;
            color: var(--gray);
            line-height: 1.7;
            max-width: 600px;
            margin: 0 auto;
        }

        .problem-punchline strong {
            color: var(--orange);
            font-size: 1.25rem;
        }

        /* ── How It Works ── */
        .how {
            padding: 6rem 2rem;
            max-width: 960px;
            margin: 0 auto;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        .how h2 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            margin-bottom: 3.5rem;
            letter-spacing: -0.01em;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
        }

        .step {
            background: white;
            border-radius: 20px;
            padding: 2.2rem;
            position: relative;
            border: 1px solid rgba(230,74,25,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .step:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }

        .step-num {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: rgba(230,74,25,0.12);
            margin-bottom: 1rem;
            line-height: 1;
        }

        .step h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.7rem;
        }

        .step p {
            font-size: 0.98rem;
            color: var(--gray);
            line-height: 1.65;
        }

        /* ── Demo Block ── */
        .demo-section {
            padding: 4rem 2rem 6rem;
            text-align: center;
        }

        .phone-mockup {
            max-width: 320px;
            margin: 0 auto;
            background: var(--dark);
            border-radius: 36px;
            padding: 16px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.15);
        }

        .phone-screen {
            background: #FAFAFA;
            border-radius: 24px;
            overflow: hidden;
            padding: 1.5rem 1rem;
        }

        .phone-header {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            text-align: left;
        }

        .demo-blocks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .demo-block {
            padding: 1rem 0.6rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.82rem;
            text-align: center;
            cursor: default;
            transition: transform 0.15s ease;
            line-height: 1.3;
        }

        .demo-block:hover { transform: scale(1.04); }

        .b-green { background: #4CAF50; }
        .b-red { background: #F44336; }
        .b-blue { background: #2196F3; }
        .b-purple { background: #9C27B0; }
        .b-orange { background: var(--orange); }
        .b-teal { background: #009688; }

        /* ── Use Cases ── */
        .usecases {
            padding: 5rem 2rem;
            background: white;
        }

        .usecases-inner {
            max-width: 960px;
            margin: 0 auto;
        }

        .usecases h2 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
        }

        .use-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .use-card {
            background: var(--gray-light);
            border-radius: 16px;
            padding: 1.8rem;
        }

        .use-emoji {
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
        }

        .use-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .use-card p {
            font-size: 0.95rem;
            color: var(--gray);
            line-height: 1.6;
        }

        /* ── Features ── */
        .features {
            padding: 5rem 2rem;
            max-width: 960px;
            margin: 0 auto;
        }

        .features h2 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            margin-bottom: 3rem;
        }

        .feat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.2rem;
        }

        .feat {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.2rem;
            border-radius: 14px;
            transition: background 0.2s ease;
        }

        .feat:hover { background: var(--gray-light); }

        .feat-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: rgba(230,74,25,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .feat h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .feat p {
            font-size: 0.9rem;
            color: var(--gray);
            line-height: 1.5;
        }

        /* ── Pricing ── */
        .pricing {
            padding: 5rem 2rem;
            background: white;
            text-align: center;
        }

        .pricing-inner {
            max-width: 480px;
            margin: 0 auto;
        }

        .pricing h2 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .pricing > .pricing-inner > p {
            color: var(--gray);
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        .price-card {
            background: var(--cream);
            border: 2px solid var(--orange);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
        }

        .price-tag {
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--orange);
            line-height: 1;
        }

        .price-tag small {
            font-size: 1rem;
            font-weight: 400;
            color: var(--gray);
            display: block;
            margin-top: 0.4rem;
        }

        .price-perks {
            list-style: none;
            margin: 1.5rem 0;
            text-align: left;
        }

        .price-perks li {
            padding: 0.5rem 0;
            font-size: 0.98rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .price-perks li::before {
            content: '\2713';
            color: var(--orange);
            font-weight: 700;
        }

        /* ── Footer ── */
        footer {
            padding: 3rem 2rem;
            text-align: center;
            color: var(--gray);
            font-size: 0.88rem;
        }

        footer a {
            color: var(--orange);
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }

        .footer-links {
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .hero { padding: 4rem 1.5rem 3rem; }
            .steps { grid-template-columns: 1fr; }
            .demo-blocks { grid-template-columns: 1fr 1fr; }
            .problem-grid { grid-template-columns: 1fr; }
            .use-grid { grid-template-columns: 1fr; }
            .feat-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ── Language Toggle ── -->
<div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('he')">עב</button>
</div>

<!-- ── Hero ── -->
<section class="hero">
    <div class="hero-icon">M</div>
    <h1>
        <span class="i18n" data-en="Stop typing the same thing " data-he="הפסיקו להקליד את אותם פרטים "></span><span class="i18n" style="color:var(--orange)" data-en="over and over" data-he="שוב ושוב"></span>
    </h1>
    <p class="i18n" data-en="Save any text once. Paste it into any app with one tap. Bank details, client replies, form answers — always ready, always instant." data-he="שמרו כל טקסט פעם אחת. הדביקו אותו בכל אפליקציה בלחיצה אחת. פרטי בנק, תשובות ללקוחות, פרטים לטפסים — תמיד מוכן, תמיד בשלוף."></p>
    <a href="https://play.google.com/store/apps/details?id=com.macrokey" class="cta-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.61 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/></svg>
        <span class="i18n" data-en="Get it on Google Play" data-he="הורידו מ-Google Play"></span>
    </a>
    <p class="hero-price i18n" data-en="Free 7-day trial &middot; Then $4.99 one-time" data-he="7 ימי ניסיון חינם &middot; אחר כך $4.99 תשלום חד-פעמי"></p>
</section>

<!-- ── The Problem ── -->
<section class="problem">
    <div class="problem-inner">
        <div class="section-label i18n" data-en="Sound familiar?" data-he="נשמע מוכר?"></div>
        <h2>
            <span class="i18n" data-en="You type the same things " data-he="אתם מקלידים את אותם דברים "></span><span style="color:var(--orange)" class="i18n" data-en="every single day" data-he="כל יום מחדש"></span>
        </h2>
        <div class="problem-grid">
            <div class="problem-card">
                <div class="problem-scene">
                    <span class="problem-emoji">💬</span>
                    <p class="problem-quote i18n" data-en="&quot;Hey, can you send me your bank details?&quot;" data-he="&quot;היי, אפשר לשלוח לי את פרטי הבנק שלך?&quot;"></p>
                </div>
                <p class="problem-desc i18n" data-en="You open Notes. Scroll. Copy. Switch apps. Paste. Again. For the 50th time this year." data-he="אתם פותחים את הפתקים. גוללים. מעתיקים. מחליפים אפליקציה. מדביקים. שוב. בפעם ה-50 השנה."></p>
            </div>
            <div class="problem-card">
                <div class="problem-scene">
                    <span class="problem-emoji">📧</span>
                    <p class="problem-quote i18n" data-en="&quot;Please fill in your address and ID number&quot;" data-he="&quot;נא למלא כתובת ומספר ת&quot;ז&quot;"></p>
                </div>
                <p class="problem-desc i18n" data-en="Another form. Same details. You start typing from memory — was it apartment 12 or 12A?" data-he="עוד טופס. אותם פרטים. אתם מתחילים להקליד מהזיכרון — זה היה דירה 12 או 12א?"></p>
            </div>
            <div class="problem-card">
                <div class="problem-scene">
                    <span class="problem-emoji">🤦</span>
                    <p class="problem-quote i18n" data-en="&quot;Can you resend that contract clause?&quot;" data-he="&quot;אפשר לשלוח שוב את הסעיף מהחוזה?&quot;"></p>
                </div>
                <p class="problem-desc i18n" data-en="You dig through old WhatsApp messages, scroll back three months, find it, copy, switch apps, paste. Five minutes gone." data-he="אתם חופרים בהודעות ישנות בוואטסאפ, גוללים שלושה חודשים אחורה, מוצאים, מעתיקים, מחליפים אפליקציה, מדביקים. חמש דקות בטלות."></p>
            </div>
        </div>
        <p class="problem-punchline">
            <span class="i18n" data-en="Every day, you waste time retyping text you've already written." data-he="כל יום אתם מבזבזים זמן על הקלדה מחדש של טקסטים שכבר כתבתם."></span><br>
            <strong class="i18n" data-en="MacroKey makes it one tap." data-he="MacroKey הופכת את זה ללחיצה אחת."></strong>
        </p>
    </div>
</section>

<!-- ── How It Works ── -->
<section class="how">
    <div class="section-label i18n" data-en="How it works" data-he="איך זה עובד"></div>
    <h2 class="i18n" data-en="Three taps. That's it." data-he="שלוש לחיצות. זהו."></h2>
    <div class="steps">
        <div class="step">
            <div class="step-num">01</div>
            <h3 class="i18n" data-en="Save your text" data-he="שמרו את הטקסט"></h3>
            <p class="i18n" data-en="Open MacroKey, create a block. Give it a name, pick a color, paste your text. You'll only do this once." data-he="פתחו את MacroKey, צרו בלוק. תנו לו שם, בחרו צבע, הדביקו את הטקסט. תעשו את זה רק פעם אחת."></p>
        </div>
        <div class="step">
            <div class="step-num">02</div>
            <h3 class="i18n" data-en="Tap the floating button" data-he="לחצו על הכפתור הצף"></h3>
            <p class="i18n" data-en="A small M button sits on your screen, always ready. When you need your text — in WhatsApp, Gmail, SMS, anywhere — tap it." data-he="כפתור M קטן יושב על המסך, תמיד מוכן. כשצריך את הטקסט — בוואטסאפ, ג'ימייל, SMS, בכל מקום — לחצו עליו."></p>
        </div>
        <div class="step">
            <div class="step-num">03</div>
            <h3 class="i18n" data-en="Tap your block" data-he="לחצו על הבלוק"></h3>
            <p class="i18n" data-en="Your color-coded blocks appear. Tap one and the full text pastes instantly into whatever app you're using. Done." data-he="הבלוקים הצבעוניים מופיעים. לחצו על אחד והטקסט המלא מודבק מיד באפליקציה שאתם משתמשים בה. נגמר."></p>
        </div>
    </div>
</section>

<!-- ── Phone Mockup ── -->
<section class="demo-section">
    <div class="phone-mockup">
        <div class="phone-screen">
            <div class="phone-header">&#x2B24; MacroKey</div>
            <div class="demo-blocks">
                <div class="demo-block b-green i18n" data-en="Bank Details" data-he="פרטי בנק"></div>
                <div class="demo-block b-red i18n" data-en="Contract Clause" data-he="סעיף חוזה"></div>
                <div class="demo-block b-blue i18n" data-en="Client Reply" data-he="תשובה ללקוח"></div>
                <div class="demo-block b-purple i18n" data-en="Home Address" data-he="כתובת בית"></div>
                <div class="demo-block b-orange i18n" data-en="Invoice Text" data-he="טקסט חשבונית"></div>
                <div class="demo-block b-teal i18n" data-en="ID Number" data-he="מספר ת&quot;ז"></div>
            </div>
        </div>
    </div>
</section>

<!-- ── Use Cases ── -->
<section class="usecases">

<script>
function setLang(lang) {
    var html = document.documentElement;
    html.setAttribute('lang', lang);
    html.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    document.querySelector('.lang-btn[onclick="setLang(\'' + lang + '\')"]').classList.add('active');

    document.querySelectorAll('.i18n').forEach(function(el) {
        var text = el.getAttribute('data-' + lang);
        if (text) el.innerHTML = text;
    });

    try { localStorage.setItem('macrokey-lang', lang); } catch(e) {}
}

// Auto-detect language on load
(function() {
    var saved = null;
    try { saved = localStorage.getItem('macrokey-lang'); } catch(e) {}
    if (saved) {
        setLang(saved);
    } else {
        var userLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        if (userLang.startsWith('he') || userLang.startsWith('iw')) {
            setLang('he');
        }
    }
})();
</script>
